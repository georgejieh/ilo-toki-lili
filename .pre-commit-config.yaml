minimum_pre_commit_version: "4.0.0"

default_language_version:
  python: python3.12

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --extra dev ruff check
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: uv run --extra dev python scripts/check.py --skip-lint --skip-tests
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: pytest-smoke
        name: pytest and contamination smoke
        entry: uv run --extra dev python scripts/check.py --skip-lint --skip-types
        language: system
        pass_filenames: false
        always_run: true

      - id: secret-scan
        name: secret scan
        entry: uv run --extra dev python scripts/scan_secrets.py
        language: system
