name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UV_LOCKED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check lockfile
        run: uv lock --check

      - name: Sync dependencies
        run: uv sync --locked --extra dev

      - name: Run lint, types, and tests
        run: uv run --locked --extra dev python scripts/check.py

      - name: Run pre-commit hooks
        run: uv run --locked --extra dev pre-commit run --all-files
